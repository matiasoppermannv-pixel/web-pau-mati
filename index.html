    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fdfcf9; color: #333; }
        .serif { font-family: 'Playfair Display', serif; }
        .bg-paper { 
            background-color: #fdfcf9; 
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png'); 
        }
    </style>
</head>
<body class="bg-paper">

    <section class="h-screen flex flex-col justify-center items-center text-center p-6">
        <h2 class="uppercase tracking-[0.3em] text-sm mb-8">¡Nos Casamos!</h2>
        <h1 class="serif text-6xl md:text-8xl mb-8">Pau & Mati</h1>
        <p class="italic serif text-xl mb-12">25 de Octubre, 2025 • La Paz, Bolivia</p>
        <div class="w-[1px] h-20 bg-black"></div>
    </section>

    <section class="py-20 px-6 text-center max-w-2xl mx-auto">

        <div class="grid md:grid-cols-2 gap-12 text-sm tracking-widest uppercase text-stone-600">

                <h3 class="font-bold mb-4">Ceremonia</h3>

            </div>
            <div>
                <h3 class="font-bold mb-4">Recepción</h3>
                <p>Salón de Eventos<br>19:00 Horas</p>
            </div>
        </div>
    </section>

    <section id="rsvp" class="py-20 bg-white/40 border-t border-b border-stone-200">
        <div class="max-w-3xl mx-auto px-6">
            <h2 class="serif text-3xl text-center mb-4 italic text-stone-800">Confirmar Asistencia</h2>
            <p class="text-center text-[10px] tracking-[0.2em] uppercase mb-12 text-stone-500">Por favor, completa el formulario a continuación</p>
            
            <iframe 
                data-tally-src="https://tally.so/embed/0QEdJB?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" 
                loading="lazy" 
                width="100%" 
                height="500" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0" 
                title="Boda Pau & Mati">
            </iframe>
            <script>
                var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s)}

        </div>
    </section>

    <footer class="py-24 text-center">
        <p class="serif italic text-2xl text-stone-700">¡Te esperamos con mucha emoción!</p>
        <p class="mt-10 text-[9px] tracking-[0.3em] uppercase opacity-40 text-stone-900">P & M • 2025</p>
    </footer>

</body>
</html>
