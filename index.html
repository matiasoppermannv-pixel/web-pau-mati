<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Pau & Mati</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://tally.so/widgets/embed.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fdfcf9; color: #333; }
        .serif { font-family: 'Playfair Display', serif; }
        .bg-paper { 
            background-color: #fdfcf9; 
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png'); 
        }
    </style>
</head>
<body class="bg-paper">

    <section class="h-screen flex flex-col justify-center items-center text-center p-6">
        <h2 class="uppercase tracking-[0.3em] text-sm mb-8">¡Nos Casamos!</h2>
        <h1 class="serif text-6xl md:text-8xl mb-8">Pau & Mati</h1>
        <p class="italic serif text-xl mb-12">25 de Octubre, 2025 • La Paz, Bolivia</p>
        <div class="w-[1px] h-20 bg-black"></div>
    </section>

    <section class="py-24 text-center bg-white/30 border-t border-b border-stone-200">
        <h2 class="serif text-3xl mb-4 italic">Asistencia</h2>
        <p class="text-[10px] tracking-[0.2em] uppercase mb-12 text-stone-500">Por favor, confirma tu presencia antes del 15 de agosto</p>
        
        <button 
            data-tally-open="0QEdJB" 
            data-tally-layout="modal" 
            data-tally-width="500" 
            data-tally-emoji-text="👋" 
            data-tally-emoji-animation="wave"
            class="inline-block bg-stone-800 text-white px-12 py-4 rounded-full tracking-widest uppercase text-xs hover:bg-stone-700 transition shadow-xl active:scale-95">
            Confirmar Asistencia
        </button>
    </section>

    <footer class="py-24 text-center">
        <p class="serif italic text-2xl opacity-80">¡Te esperamos!</p>
        <p class="mt-10 text-[9px] tracking-[0.3em] uppercase opacity-40">P & M • 2025</p>
    </footer>

</body>
</html>
