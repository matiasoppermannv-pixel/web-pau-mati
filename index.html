<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Pau & Mati</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@200;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://tally.so/widgets/embed.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fdfcf9; color: #333; }
        .serif { font-family: 'Playfair Display', serif; }
        .bg-paper { 
            background-color: #fdfcf9; 
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png'); 
        }
    </style>
</head>
<body class="bg-paper">

<section class="h-screen flex flex-col justify-center items-center text-center p-6 bg-paper">
    <h2 class="font-sans uppercase tracking-[0.4em] text-xs mb-6 opacity-70">¡Nos Casamos!</h2>
    
    <h1 class="font-elegant text-7xl md:text-9xl mb-4 text-stone-800">Pau & Mati</h1>
    
    <p class="font-serif italic text-xl mb-12 text-stone-600">25 de Octubre, 2025</p>

    <div id="countdown" class="flex gap-4 md:gap-10 mb-16">
        <div class="flex flex-col">
            <span id="days" class="text-3xl font-light">00</span>
            <span class="text-[9px] uppercase tracking-widest opacity-50">Días</span>
        </div>
        <div class="flex flex-col">
            <span id="hours" class="text-3xl font-light">00</span>
            <span class="text-[9px] uppercase tracking-widest opacity-50">Hrs</span>
        </div>
        <div class="flex flex-col">
            <span id="minutes" class="text-3xl font-light">00</span>
            <span class="text-[9px] uppercase tracking-widest opacity-50">Min</span>
        </div>
        <div class="flex flex-col">
            <span id="seconds" class="text-3xl font-light text-stone-400">00</span>
            <span class="text-[9px] uppercase tracking-widest opacity-50">Seg</span>
        </div>
    </div>

    <div class="w-[1px] h-16 bg-stone-300"></div>
</section>

    <section class="py-24 text-center bg-white/30 border-t border-b border-stone-200">
        <h2 class="serif text-3xl mb-4 italic">Asistencia</h2>
        <p class="text-[10px] tracking-[0.2em] uppercase mb-12 text-stone-500">Por favor, confirma tu presencia antes del 15 de agosto</p>
        
        <button 
            data-tally-open="0QEdJB" 
            data-tally-layout="modal" 
            data-tally-width="500" 
            data-tally-emoji-text="👋" 
            data-tally-emoji-animation="wave"
            class="inline-block bg-stone-800 text-white px-12 py-4 rounded-full tracking-widest uppercase text-xs hover:bg-stone-700 transition shadow-xl active:scale-95">
            Confirmar Asistencia
        </button>
    </section>

    <footer class="py-24 text-center">
        <p class="serif italic text-2xl opacity-80">¡Te esperamos!</p>
        <p class="mt-10 text-[9px] tracking-[0.3em] uppercase opacity-40">P & M • 2025</p>
    </footer>
<script>
    // Configura tu fecha aquí (Año, Mes-1, Día, Hora, Minuto)
    // Nota: El mes 9 es Octubre porque empieza en 0
    const weddingDate = new Date(2026, 9, 26, 16, 0, 0).getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const diff = weddingDate - now;

        if (diff <= 0) {
            clearInterval(timer);
            document.getElementById("countdown").innerHTML = "¡Llegó el día!";
            return;
        }

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = d < 10 ? "0"+d : d;
        document.getElementById("hours").innerText = h < 10 ? "0"+h : h;
        document.getElementById("minutes").innerText = m < 10 ? "0"+m : m;
        document.getElementById("seconds").innerText = s < 10 ? "0"+s : s;
    }, 1000);
</script>
</body>
</html>
